# AS-MM runtime configuration.
# Golden rule #1: the order/account REST endpoint MUST be testnet. A unit test
# enforces this (tests/test_sanity.cpp). Market DATA may come from the public
# production stream (read-only, allowed per ROADMAP Phase 2).

[exchange]
symbol = "BTCUSDT"
# Order/account REST endpoint — TESTNET ONLY.
rest_url = "https://testnet.binance.vision"
# Market-data WS — public data.binance.vision mirror (read-only, not geo-blocked;
# production stream.binance.com is HTTP 451 from US networks). Only ORDERS are
# testnet-only.
ws_market_url = "wss://data-stream.binance.vision/ws"

[engine]
log_dir = "logs"

[market_data]
snapshot_rest_url = "https://data-api.binance.vision"  # public mirror; NEVER api.binance.com (HTTP 451)
depth_stream = "depth@100ms"
depth_snapshot_limit = 5000
px_scale = 2   # BTCUSDT tickSize 0.01 (startup-verified via exchangeInfo in Phase 5)
qty_scale = 5  # stepSize 0.00001
stale_threshold_ms = 500
backoff_initial_ms = 500
backoff_max_ms = 30000
backoff_multiplier = 2.0
read_timeout_s = 10
crosscheck_interval_s = 60
crosscheck_depth_limit = 100
crosscheck_levels = 20

# Avellaneda-Stoikov strategy (paper mode; docs/MODEL.md). No orders are sent.
[strategy]
enabled = true
gamma = 1e-9   # placeholder; the usable range is tiny at BTC price scale (see docs/GAMMA_SWEEP.md)
kappa = 1.5    # documented placeholder until fit from fills (Phase 5+)
tau_days = 1.0
sigma_halflife_s = 60.0
sigma_min_samples = 30
sigma_spike_threshold = 5e-4  # per-sqrt-second relative vol -> pull quotes
hysteresis_ticks = 2
q_max_lots = 100        # 0.001 BTC soft limit -> quote one side only
quote_size_lots = 10    # 0.0001 BTC per side
maker_fee_bps = 10.0    # Binance spot 0.1%
min_notional_usdt = 5.0

# Live testnet order placement (Phase 5). DISABLED by default: with enabled=false
# the engine runs paper-only (no orders sent). Flip to true ONLY for a live
# testnet run with keys in .env. Every endpoint here is testnet-only (golden rule #1).
[orders]
enabled = false
recv_window_ms = 5000                 # signed-request recvWindow (<= 60000)
max_order_rate_per_10s = 40           # order-count token bucket
max_request_weight_per_min = 1000     # request-weight token bucket
user_data_ws_url = "wss://testnet.binance.vision/ws"  # TESTNET ONLY
reconcile_interval_s = 60             # periodic reconcile vs exchange truth
flatten_on_kill = false               # kill switch cancels-all only (no market flatten)
order_backoff_initial_ms = 500
order_backoff_max_ms = 30000
client_id_prefix = "asmm"             # newClientOrderId = "asmm-<seq>"
cancel_all_on_kill_timeout_ms = 3000
